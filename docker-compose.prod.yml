version: "3.9"

services:
  api:
    # Imagen pre-construida en GitHub Actions y subida al Container Registry.
    # DOCR_NAME se escribe en .env por el pipeline de CD antes de hacer pull.
    image: registry.digitalocean.com/${DOCR_NAME}/api:latest
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=src/models/ids_model.pkl
      - SCALER_PATH=src/models/scaler.pkl
      - MODEL_VERSION=1.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    ports:
      - "5000:5000"
    volumes:
      - /data/mlflow:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped
