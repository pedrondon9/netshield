name: ML Pipeline — Entrenamiento y Registro

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/**"
      - "requirements.txt"

jobs:
  train-and-register:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      # Credenciales de DigitalOcean Spaces (compatible con API S3)
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: https://${{ vars.DO_REGION || 'fra1' }}.digitaloceanspaces.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar AWS CLI
        run: pip install awscli

      - name: Descargar datos desde Spaces
        run: |
          mkdir -p src/data/raw
          aws s3 cp \
            s3://netshield-data-${{ vars.DO_REGION }}/raw/Friday-WorkingHours-Afternoon-DDos.pcap_ISCX.csv \
            src/data/raw/Friday-WorkingHours-Afternoon-DDos.pcap_ISCX.csv \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Ingesta y validación
        run: python -m src.data.ingesta

      - name: Preprocesamiento
        run: python -m src.data.preprocesamiento

      - name: Feature engineering
        run: python -m src.features.feature_engineering

      - name: Entrenar modelo
        # El script falla (exit 1) si no supera umbrales → pipeline se detiene
        run: python -m src.models.entrenamiento

      - name: Subir modelo a Spaces
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          aws s3 cp src/models/ids_model.pkl \
            s3://netshield-models-${{ vars.DO_REGION }}/$COMMIT/ids_model.pkl \
            --endpoint-url $AWS_ENDPOINT_URL
          aws s3 cp src/models/scaler.pkl \
            s3://netshield-models-${{ vars.DO_REGION }}/$COMMIT/scaler.pkl \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Notificar éxito
        if: success()
        run: echo "Modelo entrenado y registrado en Spaces. Listo para CD."

      - name: Notificar fallo
        if: failure()
        run: |
          echo "El modelo no superó los umbrales mínimos."
          echo "(F1-macro >= 0.85, AUC-ROC >= 0.90, Recall ataque >= 0.80)"
          echo "No se procede al despliegue."
